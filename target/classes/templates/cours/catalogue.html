<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head><title>Catalogue des cours</title></head>
<body>
<div layout:fragment="content">
<div class="container">

    <!-- En-tête -->
    <div class="text-center mb-4">
        <h1 class="fw-bold text-primary"><i class="bi bi-collection me-2"></i>Catalogue des cours</h1>
        <p class="text-muted">Trouvez la formation qui vous correspond</p>
    </div>

    <!-- Formulaire de recherche -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <form th:action="@{/catalogue}" method="get" class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Rechercher un cours</label>
                    <input type="text" name="titre" class="form-control"
                           placeholder="Titre du cours..."
                           th:value="${titreRecherche}"/>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-semibold">Catégorie</label>
                    <select name="categorie" class="form-select">
                        <option value="">Toutes les catégories</option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat}" th:text="${cat}"
                                th:selected="${cat == categorieRecherche}"></option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-semibold">Niveau</label>
                    <select name="niveau" class="form-select">
                        <option value="">Tous les niveaux</option>
                        <option th:each="niv : ${niveaux}"
                                th:value="${niv}" th:text="${niv}"
                                th:selected="${niv.name() == niveauRecherche}"></option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-search me-1"></i>Rechercher
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Résultats -->
    <div th:if="${cours.isEmpty()}" class="text-center py-5 text-muted">
        <i class="bi bi-inbox fs-1"></i>
        <p class="mt-2">Aucun cours trouvé.</p>
        <a th:href="@{/catalogue}" class="btn btn-outline-primary">Voir tous les cours</a>
    </div>

    <div class="row row-cols-1 row-cols-md-3 g-4 mb-4">
        <div class="col" th:each="c : ${cours.content}">
            <div class="card h-100 shadow-sm border-0 cours-card">
                <img th:src="${c.imageUrl != null ? c.imageUrl : '/img/default-course.jpg'}"
                     class="card-img-top" alt="Image du cours"
                     style="height:180px;object-fit:cover;"
                     onerror="this.src='https://placehold.co/400x200/4f46e5/white?text=Cours'"/>
                <div class="card-body d-flex flex-column">
                    <div class="mb-2">
                        <span class="badge bg-primary me-1" th:text="${c.categorie}">Catégorie</span>
                        <span class="badge"
                              th:classappend="${c.niveau.name() == 'DEBUTANT'} ? 'bg-success' :
                                             (${c.niveau.name() == 'INTERMEDIAIRE'} ? 'bg-warning text-dark' : 'bg-danger')"
                              th:text="${c.niveau}">Niveau</span>
                    </div>
                    <h5 class="card-title fw-bold" th:text="${c.titre}">Titre</h5>
                    <p class="card-text text-muted small flex-grow-1" th:text="${c.description}">Description</p>
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span class="fw-semibold text-dark"
                              th:text="${c.prix != null and c.prix > 0} ? (${#numbers.formatDecimal(c.prix, 1, 2)} + ' DT') : 'Gratuit'">Gratuit</span>
                        <span class="text-muted small">
                            <i class="bi bi-person me-1"></i><span th:text="${c.formateurNom}">Formateur</span>
                        </span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center text-muted small mt-2 mb-3">
                        <span><i class="bi bi-people me-1"></i><span th:text="${c.nombreInscrits}">0</span> inscrits</span>
                        <span><i class="bi bi-layers me-1"></i><span th:text="${c.nombreModules}">0</span> modules</span>
                    </div>
                    <div class="d-grid gap-2 mt-auto">
                        <a th:href="@{/cours/{id}/detail(id=${c.id})}"
                           class="btn btn-outline-primary w-100">
                            <i class="bi bi-eye me-1"></i>Voir le cours
                        </a>
                        <form th:if="${c.prix != null and c.prix > 0}" th:action="@{/panier/add/{id}(id=${c.id})}" method="post">
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-bag-plus me-1"></i>Ajouter au panier
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Pagination -->
    <nav th:if="${totalPages > 1}" class="mt-3">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/catalogue(page=${currentPage - 1}, titre=${titreRecherche}, categorie=${categorieRecherche}, niveau=${niveauRecherche})}">
                    &laquo; Précédent
                </a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link" th:text="${i + 1}"
                   th:href="@{/catalogue(page=${i}, titre=${titreRecherche}, categorie=${categorieRecherche}, niveau=${niveauRecherche})}"></a>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/catalogue(page=${currentPage + 1}, titre=${titreRecherche}, categorie=${categorieRecherche}, niveau=${niveauRecherche})}">
                    Suivant &raquo;
                </a>
            </li>
        </ul>
    </nav>

</div>
</div>
</body>
</html>
