<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head><title th:text="${cours.titre}">Cours</title></head>
<body>
<div layout:fragment="content">
<div class="container-fluid">
<div class="row">

    <!-- Sidebar modules/leçons -->
    <div class="col-lg-3 bg-light border-end p-3" style="min-height:80vh;">
        <h6 class="fw-bold text-primary mb-1" th:text="${cours.titre}">Titre</h6>
        <div class="progress mb-3" style="height:8px;">
            <div class="progress-bar bg-success" th:style="'width:' + ${pourcentage} + '%'"></div>
        </div>
        <small class="text-muted d-block mb-3" th:text="${pourcentage} + '% complété'">0%</small>

        <div th:each="module : ${cours.modules}" class="mb-3">
            <div class="fw-semibold small text-uppercase text-secondary mb-1"
                 th:text="${module.ordre} + '. ' + ${module.titre}">Module</div>
            <ul class="list-unstyled ms-2">
                <li th:each="lecon : ${module.lecons}" class="mb-1">
                    <span th:if="${#lists.contains(leconsCompleteesIds, lecon.id)}"
                          class="text-success small">
                        <i class="bi bi-check-circle-fill me-1"></i>
                        <span th:text="${lecon.titre}">Leçon</span>
                    </span>
                    <span th:unless="${#lists.contains(leconsCompleteesIds, lecon.id)}"
                          class="text-muted small">
                        <i class="bi bi-circle me-1"></i>
                        <span th:text="${lecon.titre}">Leçon</span>
                    </span>
                </li>
            </ul>
            <!-- Quiz du module si disponible -->
            <div th:if="${module.quiz != null}" class="ms-2">
                <a th:href="@{/apprenant/quiz/{id}(id=${module.quiz.id})}"
                   class="btn btn-outline-warning btn-sm w-100 mt-1">
                    <i class="bi bi-patch-question me-1"></i>Quiz du module
                </a>
            </div>
        </div>
    </div>

    <!-- Contenu principal -->
    <div class="col-lg-9 p-4">
        <div th:each="module : ${cours.modules}">
            <h4 class="text-primary fw-bold border-bottom pb-2 mb-3"
                th:text="${module.ordre} + '. ' + ${module.titre}">Module</h4>

            <div class="card border-0 shadow-sm mb-3" th:each="lecon : ${module.lecons}">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h5 class="fw-bold mb-0">
                            <span th:if="${#lists.contains(leconsCompleteesIds, lecon.id)}"
                                  class="text-success me-2"><i class="bi bi-check-circle-fill"></i></span>
                            <span th:text="${lecon.ordre} + '. ' + ${lecon.titre}">Leçon</span>
                        </h5>
                        <small class="text-muted">
                            <i class="bi bi-clock me-1"></i>
                            <span th:text="${lecon.dureeMin} + ' min'">0 min</span>
                        </small>
                    </div>
                    <div class="text-muted mb-3" th:text="${lecon.contenu}">Contenu</div>
                    <form th:unless="${#lists.contains(leconsCompleteesIds, lecon.id)}"
                          th:action="@{/apprenant/lecon/{id}/complete(id=${lecon.id})}" method="post">
                        <input type="hidden" name="coursId" th:value="${cours.id}"/>
                        <button type="submit" class="btn btn-success btn-sm">
                            <i class="bi bi-check-circle me-1"></i>Marquer comme terminée
                        </button>
                    </form>
                    <span th:if="${#lists.contains(leconsCompleteesIds, lecon.id)}"
                          class="badge bg-success">
                        <i class="bi bi-check-circle me-1"></i>Complétée
                    </span>
                </div>
            </div>
        </div>
    </div>

</div>
</div>
</div>
</body>
</html>
