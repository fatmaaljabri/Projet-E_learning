<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Inscription - ELearn FST</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
</head>
<body class="bg-light">
<div class="d-flex align-items-center justify-content-center min-vh-100 py-4">
    <div class="card shadow border-0" style="width:100%;max-width:480px;">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <i class="bi bi-mortarboard-fill text-primary fs-1"></i>
                <h3 class="fw-bold mt-2">Créer un compte</h3>
                <p class="text-muted">Rejoignez la plateforme ELearn FST</p>
            </div>

            <div th:if="${erreur}" class="alert alert-danger" th:text="${erreur}"></div>

            <form th:action="@{/auth/register}" method="post" th:object="${utilisateur}">
                <div class="row g-3">
                    <div class="col-6">
                        <label class="form-label fw-semibold">Prénom</label>
                        <input type="text" class="form-control" th:field="*{prenom}"
                               placeholder="Prénom" required/>
                    </div>
                    <div class="col-6">
                        <label class="form-label fw-semibold">Nom</label>
                        <input type="text" class="form-control" th:field="*{nom}"
                               placeholder="Nom" required/>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Email</label>
                        <input type="email" class="form-control" th:field="*{email}"
                               placeholder="votre@email.com" required/>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Mot de passe</label>
                        <input type="password" class="form-control" th:field="*{motDePasse}"
                               placeholder="••••••••" minlength="6" required/>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Je suis</label>
                        <select class="form-select" th:field="*{role}" required>
                            <option value="">-- Choisir un rôle --</option>
                            <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
                        </select>
                    </div>
                    <div class="col-12 mt-2">
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                            <i class="bi bi-person-plus me-2"></i>Créer mon compte
                        </button>
                    </div>
                </div>
            </form>

            <hr class="my-3"/>
            <p class="text-center text-muted mb-0">
                Déjà un compte ?
                <a th:href="@{/auth/login}" class="text-primary fw-semibold">Se connecter</a>
            </p>
        </div>
    </div>
</div>
</body>
</html>
