<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Inscription - Dourousi Academy</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="app-shell">
<div class="d-flex align-items-center justify-content-center min-vh-100 py-4">
    <div class="card shadow border-0" style="width:100%;max-width:480px;">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <img th:src="@{/img/dourousi-logo.svg}" alt="Dourousi Academy" width="54" height="54"/>
                <h3 class="fw-bold mt-2">Créer un compte</h3>
                <p class="text-muted">Rejoignez Dourousi Academy</p>
            </div>

            <div th:if="${erreur}" class="alert alert-danger" th:text="${erreur}"></div>

            <form th:action="@{/auth/register}" method="post" th:object="${utilisateur}">
                <div class="row g-3">
                    <div class="col-6">
                        <label class="form-label fw-semibold">Prénom</label>
                        <input type="text" class="form-control" th:field="*{prenom}" id="prenom"
                               placeholder="Prénom" required/>
                    </div>
                    <div class="col-6">
                        <label class="form-label fw-semibold">Nom</label>
                        <input type="text" class="form-control" th:field="*{nom}" id="nom"
                               placeholder="Nom" required/>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Email</label>
                        <input type="email" class="form-control" th:field="*{email}" id="email"
                               placeholder="votre@email.com" required/>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Mot de passe</label>
                        <input type="password" class="form-control" th:field="*{motDePasse}" id="motDePasse"
                               placeholder="Au moins 8 caractères, lettre + chiffre" minlength="8" required/>
                        <div class="form-text">
                            Le mot de passe doit être différent de votre email et de votre nom/prénom.
                        </div>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Confirmer le mot de passe</label>
                        <input type="password" class="form-control" name="confirmerMotDePasse" id="confirmerMotDePasse"
                               placeholder="••••••••" minlength="8" required/>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Je suis</label>
                        <select class="form-select" th:field="*{role}" required>
                            <option value="">-- Choisir un rôle --</option>
                            <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
                        </select>
                    </div>
                    <div class="col-12 mt-2">
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                            <i class="bi bi-person-plus me-2"></i>Créer mon compte
                        </button>
                        <div class="text-muted small mt-2">
                            Après inscription, vous recevrez un email pour activer votre compte.
                        </div>
                    </div>
                </div>
            </form>

            <hr class="my-3"/>
            <p class="text-center text-muted mb-0">
                Déjà un compte ?
                <a th:href="@{/auth/login}" class="text-primary fw-semibold">Se connecter</a>
            </p>
        </div>
    </div>
</div>

<script>
    (function () {
        const email = document.getElementById('email');
        const nom = document.getElementById('nom');
        const prenom = document.getElementById('prenom');
        const mdp = document.getElementById('motDePasse');
        const mdp2 = document.getElementById('confirmerMotDePasse');

        function normalize(v) { return (v || '').trim().toLowerCase(); }
        function validate() {
            if (!mdp || !mdp2) return;
            const p = normalize(mdp.value);
            const e = normalize(email && email.value);
            const n = normalize(nom && nom.value);
            const pr = normalize(prenom && prenom.value);

            const mismatch = mdp.value !== mdp2.value;
            mdp2.setCustomValidity(mismatch ? 'Les mots de passe ne correspondent pas' : '');

            const tooCommon = (p && (p === e || p === n || p === pr || p === normalize((prenom?.value || '') + ' ' + (nom?.value || ''))));
            mdp.setCustomValidity(tooCommon ? 'Le mot de passe doit être différent de votre email/nom/prénom' : '');
        }

        [email, nom, prenom, mdp, mdp2].filter(Boolean).forEach(el => el.addEventListener('input', validate));
    })();
</script>
</body>
</html>
