<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title layout:title-pattern="$CONTENT_TITLE - Dourousi Academy">Dourousi Academy</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="app-shell">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" th:href="@{/}">
            <img th:src="@{/img/dourousi-logo.svg}" alt="Dourousi Academy" width="28" height="28"
                 class="brand-logo" />
            <span>Dourousi Academy</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">
                        <i class="bi bi-house-door me-1"></i>Accueil
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/catalogue}">
                        <i class="bi bi-grid-3x3-gap me-1"></i>Catalogue
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('APPRENANT')">
                    <a class="nav-link" th:href="@{/apprenant/dashboard}">
                        <i class="bi bi-person-check me-1"></i>Mon espace
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('FORMATEUR')">
                    <a class="nav-link" th:href="@{/formateur/dashboard}">
                        <i class="bi bi-easel me-1"></i>Mes cours
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('PARENT')">
                    <a class="nav-link" th:href="@{/parent/dashboard}">
                        <i class="bi bi-people me-1"></i>Espace parent
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/dashboard}">
                        <i class="bi bi-speedometer2 me-1"></i>Admin
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/formateurs}">
                        <i class="bi bi-person-badge me-1"></i>Formateurs
                    </a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link position-relative" th:href="@{/panier}">
                        <i class="bi bi-bag me-1"></i>Panier
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-warning text-dark"
                              th:if="${panierCount != null and panierCount > 0}"
                              th:text="${panierCount}">0</span>
                    </a>
                </li>
                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="nav-link" th:href="@{/auth/login}">
                        <i class="bi bi-box-arrow-in-right me-1"></i>Connexion
                    </a>
                </li>
                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="btn btn-outline-light btn-sm ms-2" th:href="@{/auth/register}">S'inscrire</a>
                </li>
                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle me-1"></i>
                        <span sec:authentication="name">Utilisateur</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li>
                            <form th:action="@{/auth/logout}" method="post">
                                <button class="dropdown-item text-danger" type="submit">
                                    <i class="bi bi-box-arrow-right me-1"></i>Déconnexion
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Contenu principal -->
<main class="py-4">
    <div layout:fragment="content">
        <!-- Le contenu de chaque page sera inséré ici -->
    </div>
</main>

<!-- Footer -->
<footer class="bg-dark text-light py-3 mt-5">
    <div class="container text-center">
        <small>© 2026 Dourousi Academy — Plateforme E‑Learning</small>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
