<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head><title>Formulaire Cours</title></head>
<body>
<div layout:fragment="content">
<div class="container" style="max-width:720px;">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/formateur/dashboard}">Mon espace</a></li>
            <li class="breadcrumb-item active"
                th:text="${cours.id != null} ? 'Modifier le cours' : 'Nouveau cours'">Cours</li>
        </ol>
    </nav>

    <div class="card border-0 shadow-sm">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">
                <i class="bi bi-pencil-square me-2"></i>
                <span th:text="${cours.id != null} ? 'Modifier le cours' : 'Créer un nouveau cours'">Cours</span>
            </h5>
        </div>
        <div class="card-body p-4">
            <form th:action="${cours.id != null} ?
                  @{/formateur/cours/{id}/modifier(id=${cours.id})} :
                  @{/formateur/cours/nouveau}"
                  method="post" th:object="${cours}" enctype="multipart/form-data">

                <div class="mb-3">
                    <label class="form-label fw-semibold">Titre du cours <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" th:field="*{titre}"
                           placeholder="Ex: Introduction à Spring Boot" required/>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Description</label>
                    <textarea class="form-control" th:field="*{description}" rows="4"
                              placeholder="Décrivez le contenu et les objectifs du cours..."></textarea>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Catégorie</label>
                        <input type="text" class="form-control" th:field="*{categorie}"
                               placeholder="Ex: Programmation, Web, Base de données..."/>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Niveau <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{niveau}" required>
                            <option value="">-- Choisir un niveau --</option>
                            <option th:each="niv : ${niveaux}" th:value="${niv}" th:text="${niv}"></option>
                        </select>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Prix (DT)</label>
                    <input type="number" class="form-control" th:field="*{prix}"
                           min="0" step="0.01" placeholder="0.00"/>
                    <small class="text-muted">Mettez 0 pour un cours gratuit.</small>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Image de couverture</label>
                    <input type="file" class="form-control" name="image" accept="image/*"/>
                    <div th:if="${cours.imageUrl != null}" class="mt-2">
                        <img th:src="${cours.imageUrl}" alt="Image actuelle"
                             class="img-thumbnail" style="max-height:120px;"/>
                        <small class="text-muted d-block">Image actuelle — Choisissez une nouvelle image pour la remplacer</small>
                    </div>
                </div>

                <div class="mb-4 form-check">
                    <input type="checkbox" class="form-check-input" th:field="*{actif}" id="actif"/>
                    <label class="form-check-label" for="actif">Cours visible dans le catalogue</label>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary px-4">
                        <i class="bi bi-save me-1"></i>
                        <span th:text="${cours.id != null} ? 'Enregistrer les modifications' : 'Créer le cours'">Sauvegarder</span>
                    </button>
                    <a th:href="@{/formateur/dashboard}" class="btn btn-outline-secondary">Annuler</a>
                </div>
            </form>
        </div>
    </div>

</div>
</div>
</body>
</html>
