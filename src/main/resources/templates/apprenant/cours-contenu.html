<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head><title th:text="${cours.titre}">Cours</title></head>
<body>
<div layout:fragment="content">
<div class="container-fluid">
<div class="row">

    <!-- Sidebar modules/leçons -->
    <div class="col-lg-3 bg-light border-end p-3" style="min-height:80vh;">
        <h6 class="fw-bold text-primary mb-1" th:text="${cours.titre}">Titre</h6>
        <div class="progress mb-3" style="height:8px;">
            <div class="progress-bar bg-success" th:style="'width:' + ${pourcentage} + '%'"></div>
        </div>
        <small class="text-muted d-block mb-3" th:text="${pourcentage} + '% complété'">0%</small>

        <div th:each="module : ${cours.modules}" class="mb-3">
            <div class="fw-semibold small text-uppercase text-secondary mb-1"
                 th:text="${module.ordre} + '. ' + ${module.titre}">Module</div>
            <ul class="list-unstyled ms-2">
                <li th:each="lecon : ${module.lecons}" class="mb-1">
                    <span th:if="${#lists.contains(leconsCompleteesIds, lecon.id)}"
                          class="text-success small">
                        <i class="bi bi-check-circle-fill me-1"></i>
                        <span th:text="${lecon.titre}">Leçon</span>
                    </span>
                    <span th:unless="${#lists.contains(leconsCompleteesIds, lecon.id)}"
                          class="text-muted small">
                        <i class="bi bi-circle me-1"></i>
                        <span th:text="${lecon.titre}">Leçon</span>
                    </span>
                </li>
            </ul>
            <!-- Quiz du module si disponible -->
            <div th:if="${module.quiz != null}" class="ms-2">
                <a th:href="@{/apprenant/quiz/{id}(id=${module.quiz.id})}"
                   class="btn btn-outline-warning btn-sm w-100 mt-1">
                    <i class="bi bi-patch-question me-1"></i>Quiz du module
                </a>
            </div>
        </div>
    </div>

    <!-- Contenu principal -->
    <div class="col-lg-9 p-4">
        <div th:each="module : ${cours.modules}">
            <h4 class="text-primary fw-bold border-bottom pb-2 mb-3"
                th:text="${module.ordre} + '. ' + ${module.titre}">Module</h4>

            <div class="card border-0 shadow-sm mb-3" th:each="lecon : ${module.lecons}">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h5 class="fw-bold mb-0">
                            <span th:if="${#lists.contains(leconsCompleteesIds, lecon.id)}"
                                  class="text-success me-2"><i class="bi bi-check-circle-fill"></i></span>
                            <span th:text="${lecon.ordre} + '. ' + ${lecon.titre}">Leçon</span>
                        </h5>
                        <small class="text-muted">
                            <i class="bi bi-clock me-1"></i>
                            <span th:text="${lecon.dureeMin} + ' min'">0 min</span>
                        </small>
                    </div>
                    <div class="text-muted mb-3" th:text="${lecon.contenu}">Contenu</div>

                    <div th:if="${lecon.pdfUrl != null}" class="mb-3">
                        <div class="d-flex flex-wrap gap-2">
                            <button class="btn btn-outline-danger btn-sm" type="button"
                                    data-bs-toggle="collapse"
                                    th:attr="data-bs-target='#pdf' + ${lecon.id}">
                                <i class="bi bi-file-earmark-pdf me-1"></i>Lire le PDF
                            </button>
                            <button class="btn btn-outline-primary btn-sm" type="button"
                                    th:attr="data-lecon-id=${lecon.id}"
                                    onclick="loadPdfText(this)">
                                <i class="bi bi-fonts me-1"></i>Extraire le texte
                            </button>
                            <select class="form-select form-select-sm w-auto" th:attr="data-lang-for=${lecon.id}">
                                <option value="fr">FR</option>
                                <option value="en">EN</option>
                                <option value="ar">AR</option>
                            </select>
                            <button class="btn btn-primary btn-sm" type="button"
                                    th:attr="data-lecon-id=${lecon.id}"
                                    onclick="translatePdfText(this)">
                                <i class="bi bi-translate me-1"></i>Traduire
                            </button>
                        </div>

                        <div class="collapse mt-2" th:id="'pdf' + ${lecon.id}">
                            <div class="ratio ratio-16x9">
                                <iframe th:src="${lecon.pdfUrl}" style="border:0;border-radius:12px;"></iframe>
                            </div>
                        </div>

                        <div class="mt-2">
                            <textarea class="form-control small" rows="5"
                                      th:id="'pdfText' + ${lecon.id}"
                                      placeholder="Texte extrait / traduit…"></textarea>
                        </div>
                    </div>
                    <form th:unless="${#lists.contains(leconsCompleteesIds, lecon.id)}"
                          th:action="@{/apprenant/lecon/{id}/complete(id=${lecon.id})}" method="post">
                        <input type="hidden" name="coursId" th:value="${cours.id}"/>
                        <button type="submit" class="btn btn-success btn-sm">
                            <i class="bi bi-check-circle me-1"></i>Marquer comme terminée
                        </button>
                    </form>
                    <span th:if="${#lists.contains(leconsCompleteesIds, lecon.id)}"
                          class="badge bg-success">
                        <i class="bi bi-check-circle me-1"></i>Complétée
                    </span>
                </div>
            </div>
        </div>
    </div>

</div>
</div>
</div>

<script>
    async function loadPdfText(btn) {
        const id = btn.getAttribute('data-lecon-id');
        const target = document.getElementById('pdfText' + id);
        if (!id || !target) return;
        target.value = 'Extraction en cours...';
        try {
            const res = await fetch('/lecons/' + id + '/pdf/text');
            if (!res.ok) throw new Error('HTTP ' + res.status);
            target.value = await res.text();
        } catch (e) {
            target.value = 'Impossible d\\'extraire le texte (PDF manquant ou erreur serveur).';
        }
    }

    async function translatePdfText(btn) {
        const id = btn.getAttribute('data-lecon-id');
        const target = document.getElementById('pdfText' + id);
        const langSel = document.querySelector('[data-lang-for=\"' + id + '\"]');
        if (!id || !target || !langSel) return;
        const text = (target.value || '').trim();
        if (!text) {
            target.value = 'Veuillez d\\'abord extraire le texte.';
            return;
        }
        const to = langSel.value || 'fr';
        target.value = 'Traduction en cours...';
        try {
            const res = await fetch('/lecons/' + id + '/pdf/translate?to=' + encodeURIComponent(to), {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain; charset=utf-8' },
                body: text
            });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            target.value = await res.text();
        } catch (e) {
            target.value = 'Traduction indisponible (vérifiez la connexion internet).';
        }
    }
</script>
</body>
</html>
