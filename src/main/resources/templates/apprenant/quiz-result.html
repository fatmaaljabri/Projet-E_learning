<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head><title>Résultat du Quiz</title></head>
<body>
<div layout:fragment="content">
<div class="container" style="max-width:600px;">
    <div class="text-center">

        <div th:if="${result.reussi}">
            <i class="bi bi-trophy-fill text-warning" style="font-size:5rem;"></i>
            <h2 class="fw-bold text-success mt-3">Félicitations !</h2>
            <p class="text-muted">Vous avez réussi ce quiz avec succès.</p>
        </div>
        <div th:unless="${result.reussi}">
            <i class="bi bi-emoji-frown text-danger" style="font-size:5rem;"></i>
            <h2 class="fw-bold text-danger mt-3">Dommage !</h2>
            <p class="text-muted">Vous n'avez pas atteint le seuil de réussite (60%).</p>
        </div>

        <!-- Cercle de score -->
        <div class="my-4 d-flex justify-content-center">
            <div class="rounded-circle d-flex align-items-center justify-content-center border border-4 shadow"
                 th:classappend="${result.reussi} ? 'border-success' : 'border-danger'"
                 style="width:140px;height:140px;">
                <div>
                    <div class="fw-bold" style="font-size:2rem;"
                         th:text="${result.score} + '/' + ${result.totalQuestions}">0/0</div>
                    <div class="small text-muted"
                         th:text="${#numbers.formatDecimal(result.pourcentage, 1, 1)} + '%'">0%</div>
                </div>
            </div>
        </div>

        <div class="progress mb-3" style="height:14px;">
            <div class="progress-bar fw-bold"
                 th:classappend="${result.reussi} ? 'bg-success' : 'bg-danger'"
                 th:style="'width:' + ${result.pourcentage} + '%'"
                 th:text="${#numbers.formatDecimal(result.pourcentage, 1, 1)} + '%'">0%</div>
        </div>

        <div class="d-flex gap-2 justify-content-center mt-4">
            <a th:href="@{/apprenant/dashboard}" class="btn btn-primary">
                <i class="bi bi-house me-1"></i>Mon espace
            </a>
            <a th:href="@{/catalogue}" class="btn btn-outline-secondary">
                <i class="bi bi-grid me-1"></i>Catalogue
            </a>
        </div>
    </div>
</div>
</div>
</body>
</html>
