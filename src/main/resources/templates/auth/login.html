<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Connexion - Dourousi Academy</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="app-shell">
<div class="d-flex align-items-center justify-content-center min-vh-100 py-4">
    <div class="card shadow border-0" style="width:100%;max-width:420px;">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <img th:src="@{/img/dourousi-logo.svg}" alt="Dourousi Academy" width="54" height="54"/>
                <h3 class="fw-bold mt-2">Dourousi Academy</h3>
                <p class="text-muted">Connectez-vous à votre espace</p>
            </div>

            <div th:if="${erreur}" class="alert alert-danger" th:text="${erreur}"></div>
            <div th:if="${param.verifySent}" class="alert alert-info">
                Un email de vérification a été envoyé.
                <div class="small mt-1">Vous pouvez cliquer le lien reçu ou saisir le code à 6 chiffres.</div>
            </div>
            <div th:if="${param.verified}" class="alert alert-success">
                Email vérifié. Votre compte est maintenant activé.
            </div>

            <form th:action="@{/auth/login}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" name="username" class="form-control"
                               placeholder="votre@email.com" required/>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Mot de passe</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" name="password" class="form-control"
                               placeholder="••••••••" required/>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
                </button>
            </form>

            <hr class="my-3"/>
            <p class="text-center text-muted mb-0">
                Pas encore de compte ?
                <a th:href="@{/auth/register}" class="text-primary fw-semibold">Créer un compte</a>
            </p>
            <p class="text-center mt-2">
                <a th:href="@{/catalogue}" class="text-muted small">
                    <i class="bi bi-arrow-left me-1"></i>Retour au catalogue
                </a>
            </p>
            <p class="text-center mt-1">
                <a th:href="@{/auth/verify-code}" class="text-primary small">Entrer un code de vérification</a>
            </p>
        </div>
    </div>
</div>
</body>
</html>
