<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Vérifier mon compte - Dourousi Academy</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="app-shell">
<div class="d-flex align-items-center justify-content-center min-vh-100 py-4">
    <div class="card shadow border-0" style="width:100%;max-width:420px;">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <img th:src="@{/img/dourousi-logo.svg}" alt="Dourousi Academy" width="54" height="54"/>
                <h3 class="fw-bold mt-2">Vérification email</h3>
                <p class="text-muted">Saisissez le code reçu par email</p>
            </div>

            <div th:if="${verifySent}" class="alert alert-info">
                Le compte n'est pas encore créé. Entrez le code reçu pour finaliser la création du compte.
            </div>
            <div th:if="${erreur}" class="alert alert-danger" th:text="${erreur}"></div>

            <form th:action="@{/auth/verify-code}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Email</label>
                    <input type="email" name="email" class="form-control" th:value="${email}" required/>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Code (6 chiffres)</label>
                    <input type="text" name="code" class="form-control" minlength="6" maxlength="6"
                           pattern="[0-9]{6}" placeholder="123456" required/>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                    <i class="bi bi-check2-circle me-2"></i>Vérifier mon compte
                </button>
            </form>

            <p class="text-center mt-3 mb-0">
                <a th:href="@{/auth/login}" class="text-muted small">
                    <i class="bi bi-arrow-left me-1"></i>Retour connexion
                </a>
            </p>
        </div>
    </div>
</div>
</body>
</html>
