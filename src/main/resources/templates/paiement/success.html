<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head><title>Paiement confirmé</title></head>
<body>
<div layout:fragment="content">
    <div class="container" style="max-width:860px;">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-5 text-center">
                <div class="mb-3">
                    <i class="bi bi-check2-circle text-success" style="font-size:3rem;"></i>
                </div>
                <h2 class="fw-bold text-dark mb-2">Paiement confirmé</h2>
                <p class="text-muted mb-4">
                    Vos inscriptions ont été créées. Vous pouvez maintenant accéder aux cours depuis votre espace.
                </p>
                <div class="d-flex justify-content-center gap-2 flex-wrap">
                    <a th:href="@{/apprenant/dashboard}" class="btn btn-primary btn-lg">
                        <i class="bi bi-person-check me-2"></i>Aller à mon espace
                    </a>
                    <a th:href="@{/catalogue}" class="btn btn-outline-secondary btn-lg">
                        Explorer d’autres cours
                    </a>
                </div>
                <div class="text-muted small mt-3">
                    <i class="bi bi-info-circle me-1"></i>Démo: ce checkout est simulé (sans passerelle réelle).
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
