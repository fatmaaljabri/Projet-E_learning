<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head><title>Checkout</title></head>
<body>
<div layout:fragment="content">
    <div class="container" style="max-width:980px;">
        <div class="d-flex align-items-center justify-content-between mb-3">
            <h2 class="fw-bold text-white mb-0"><i class="bi bi-credit-card me-2"></i>Paiement</h2>
            <a th:href="@{/panier}" class="btn btn-outline-light btn-sm">Retour panier</a>
        </div>

        <div th:if="${erreur}" class="alert alert-danger" th:text="${erreur}"></div>

        <div class="row g-3">
            <div class="col-lg-7">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <h5 class="fw-bold text-dark mb-3">Informations de paiement</h5>

                        <form th:action="@{/paiement/checkout}" method="post" id="checkoutForm" novalidate>
                            <div class="row g-3">
                                <div class="col-12">
                                    <label class="form-label fw-semibold">Nom complet</label>
                                    <input class="form-control" name="nomComplet" required minlength="3" placeholder="Votre nom"/>
                                    <div class="invalid-feedback">Nom invalide.</div>
                                </div>
                                <div class="col-12">
                                    <label class="form-label fw-semibold">Email</label>
                                    <input class="form-control" type="email" name="email" required placeholder="vous@email.com"/>
                                    <div class="invalid-feedback">Email invalide.</div>
                                </div>
                                <div class="col-12">
                                    <label class="form-label fw-semibold">Numéro de carte</label>
                                    <input class="form-control" name="cardNumber" inputmode="numeric"
                                           placeholder="1234 5678 9012 3456" required minlength="12"/>
                                    <div class="invalid-feedback">Numéro de carte invalide.</div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Expiration (MM/AA)</label>
                                    <input class="form-control" name="expiry" placeholder="08/28" required minlength="4"/>
                                    <div class="invalid-feedback">Expiration invalide.</div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">CVC</label>
                                    <input class="form-control" name="cvc" inputmode="numeric" placeholder="123" required minlength="3" maxlength="4"/>
                                    <div class="invalid-feedback">CVC invalide.</div>
                                </div>
                            </div>

                            <button class="btn btn-primary btn-lg w-100 mt-4" type="submit"
                                    th:disabled="${items.isEmpty()}">
                                <i class="bi bi-lock me-2"></i>Payer maintenant
                            </button>

                            <div class="text-muted small mt-2">
                                <i class="bi bi-info-circle me-1"></i>Démo: aucun vrai débit. Les inscriptions sont créées et votre panier est vidé.
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-5">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <h5 class="fw-bold text-dark mb-3">Récapitulatif</h5>

                        <div th:if="${items.isEmpty()}" class="text-muted">Aucun article.</div>
                        <div th:each="it : ${items}" class="d-flex justify-content-between align-items-start mb-2">
                            <div class="me-2">
                                <div class="fw-semibold text-dark" th:text="${it.titre}">Titre</div>
                                <div class="text-muted small">Cours premium</div>
                            </div>
                            <div class="fw-bold text-dark" th:text="${#numbers.formatDecimal(it.prix, 1, 2)} + ' DT'">0.00 DT</div>
                        </div>

                        <hr/>
                        <div class="d-flex justify-content-between">
                            <span class="text-muted">Total</span>
                            <span class="fw-bold text-dark" th:text="${#numbers.formatDecimal(total, 1, 2)} + ' DT'">0.00 DT</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function () {
            const form = document.getElementById('checkoutForm');
            if (!form) return;
            form.addEventListener('submit', function (event) {
                if (!form.checkValidity()) {
                    event.preventDefault();
                    event.stopPropagation();
                }
                form.classList.add('was-validated');
            }, false);
        })();
    </script>
</div>
</body>
</html>
